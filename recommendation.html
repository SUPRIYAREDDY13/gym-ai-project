<!DOCTYPE html>
<html>
<body>

<h2>AI Recommendation</h2>

<select id="goal">
    <option>Weight Loss</option>
    <option>Muscle Gain</option>
</select>

<button onclick="getRec()">Get Plan</button>

<p id="diet"></p>
<p id="workout"></p>

<script>
function getRec() {
    fetch("https://gym-ai-project-1.onrender.com/get_recommendation", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            goal: document.getElementById("goal").value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("diet").innerText = data.diet;
        document.getElementById("workout").innerText = data.workout;
    });
}
</script>

</body>
</html>
