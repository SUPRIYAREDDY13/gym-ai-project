<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Gym AI System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center">Login</h2>

    <input type="email" id="email" class="form-control mb-2" placeholder="Email">
    <input type="password" id="password" class="form-control mb-2" placeholder="Password">

    <button onclick="sendOTP()" class="btn btn-warning w-100 mb-2">Send OTP</button>

    <input type="text" id="otp" class="form-control mb-2" placeholder="Enter OTP">

    <button onclick="verifyOTP()" class="btn btn-success w-100">Login</button>

    <p class="text-center mt-2">
        <a href="forgot_password.html">Forgot Password?</a>
    </p>
</div>

<script>
let userEmail = "";

// SEND OTP
function sendOTP() {
    userEmail = document.getElementById("email").value;

    fetch("https://gym-ai-project-1.onrender.com/send_otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: userEmail })
    })
    .then(res => res.json())
    .then(() => alert("OTP sent!"));
}

// VERIFY OTP
function verifyOTP() {
    const otp = document.getElementById("otp").value;

    fetch("https://gym-ai-project-1.onrender.com/verify_otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: userEmail,
            otp: otp
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.message === "OTP verified") {
            alert("Login success");
            localStorage.setItem("loggedInUser", userEmail);
            window.location.href = "member_dashboard.html";
        } else {
            alert("Invalid OTP");
        }
    });
}
</script>

</body>
</html>
