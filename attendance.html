<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Gym AI System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Gym AI System</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="member_dashboard.html">Member Dashboard</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5">
    <h2 class="text-center mb-4">My Attendance</h2>

    <div class="card shadow p-4">
        <table class="table table-bordered table-striped text-center">
            <thead class="table-dark">
                <tr>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>

            <!-- ✅ EMPTY tbody (dynamic data will come here) -->
            <tbody>
            </tbody>

        </table>
    </div>
</div>

<footer>
    <p>AI-Based Gym Analysis and Monitoring System | 2026</p>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const email = localStorage.getItem("loggedInUser");

    if (!email) {
        alert("Please login first!");
        window.location.href = "login.html";
        return;
    }

    fetch(`http://127.0.0.1:5000/get_attendance/${email}`)
    .then(response => response.json())
    .then(data => {

        const tableBody = document.querySelector("tbody");
        tableBody.innerHTML = "";

        if (data.length === 0) {
            tableBody.innerHTML = "<tr><td colspan='2'>No attendance found</td></tr>";
        }

        data.forEach(record => {
            const row = `
                <tr>
                    <td>${record.date}</td>
                    <td>${record.status}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    })
    .catch(error => {
        console.error("Error:", error);
        alert("Failed to load attendance");
    });

});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
