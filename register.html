<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Gym AI System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Style -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    
    <div class="card p-4 shadow-lg" style="width:100%; max-width:400px; border-radius:20px;">
        
        <h3 class="text-center mb-4">📝 Register</h3>

        <!-- FORM -->
        <input id="name" class="form-control mb-3" placeholder="Full Name">
        <input id="email" type="email" class="form-control mb-3" placeholder="Email">
        <input id="phone" class="form-control mb-3" placeholder="Phone Number">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">

        <button onclick="register()" class="btn btn-dark w-100">
            Register
        </button>

        <p class="text-center mt-3">
            Already have an account? <a href="login.html">Login</a>
        </p>

    </div>
</div>

<script>
function register() {

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const password = document.getElementById("password").value;

    if (!name || !email || !phone || !password) {
        alert("Please fill all fields!");
        return;
    }

    fetch("https://gym-ai-project-1.onrender.com/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            email: email,
            phone: phone,
            role: "member",
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.message === "Email already exists") {
            alert("Email already registered!");
        } else {
            alert("Registration successful!");
            window.location.href = "login.html";
        }
    })
    .catch(() => {
        alert("Server error! Try again.");
    });
}
</script>

</body>
</html>
