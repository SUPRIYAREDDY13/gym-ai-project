<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Dashboard</h2>

<canvas id="attendanceChart"></canvas>
<canvas id="workoutChart"></canvas>

<script>
const email = localStorage.getItem("loggedInUser");

// Attendance
fetch(`https://gym-ai-project-1.onrender.com/get_attendance/${email}`)
.then(res => res.json())
.then(data => {
    new Chart(document.getElementById("attendanceChart"), {
        type: "line",
        data: {
            labels: data.map(d => d.date),
            datasets: [{
                label: "Attendance",
                data: data.map(d => d.status === "Present" ? 1 : 0)
            }]
        }
    });
});

// Workout
fetch(`https://gym-ai-project-1.onrender.com/get_workout/${email}`)
.then(res => res.json())
.then(data => {
    new Chart(document.getElementById("workoutChart"), {
        type: "bar",
        data: {
            labels: data.map(d => d.exercise),
            datasets: [{
                label: "Workout",
                data: data.map(() => 1)
            }]
        }
    });
});
</script>

</body>
</html>
