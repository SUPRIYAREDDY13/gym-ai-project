<!DOCTYPE html>
<html>
<body>

<h2>Reset Password</h2>

<input id="email" placeholder="Email"><br><br>
<button onclick="sendOTP()">Send OTP</button><br><br>

<input id="otp" placeholder="OTP"><br><br>
<input id="newPassword" placeholder="New Password"><br><br>

<button onclick="reset()">Reset</button>

<script>
let email = "";

function sendOTP() {
    email = document.getElementById("email").value;

    fetch("https://gym-ai-project-1.onrender.com/send_otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email })
    });
}

function reset() {
    fetch("https://gym-ai-project-1.onrender.com/reset_password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: email,
            new_password: document.getElementById("newPassword").value
        })
    })
    .then(() => alert("Password reset!"));
}
</script>

</body>
</html>
