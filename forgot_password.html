<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Reset Password</h2>

    <div class="card p-4">

        <input type="email" id="email" class="form-control mb-2" placeholder="Enter Email">

        <button onclick="sendOTP()" class="btn btn-warning mb-2">
            Send OTP
        </button>

        <input type="text" id="otp" class="form-control mb-2" placeholder="Enter OTP">

        <button onclick="verifyOTP()" class="btn btn-success mb-2">
            Verify OTP
        </button>

        <input type="password" id="newPassword" class="form-control mb-2" placeholder="New Password">

        <button onclick="resetPassword()" class="btn btn-primary">
            Reset Password
        </button>

    </div>
</div>

<script>
let userEmail = "";
let otpVerified = false;

function sendOTP() {
    userEmail = document.getElementById("email").value;

    fetch("http://127.0.0.1:5000/send_otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: userEmail })
    })
    .then(res => res.json())
    .then(() => alert("OTP sent!"));
}

function verifyOTP() {
    const otp = document.getElementById("otp").value;

    fetch("http://127.0.0.1:5000/verify_otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: userEmail, otp: otp })
    })
    .then(res => res.json())
    .then(data => {
        if (data.message === "OTP verified") {
            otpVerified = true;
            alert("OTP verified!");
        } else {
            alert("Invalid OTP!");
        }
    });
}

function resetPassword() {
    if (!otpVerified) {
        alert("Verify OTP first!");
        return;
    }

    const newPassword = document.getElementById("newPassword").value;

    fetch("http://127.0.0.1:5000/reset_password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: userEmail,
            new_password: newPassword
        })
    })
    .then(res => res.json())
    .then(() => {
        alert("Password reset successful!");
        window.location.href = "login.html";
    });
}
</script>

</body>
</html>
